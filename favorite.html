      <p id="favorite-empty">No favorite products yet.</p>
    </section>
  </main>
</div>

<script src="assets/scripts/script.js"></script>

<script>
const API_URL = '/api';

function getCurrentUser() {
  try { return JSON.parse(localStorage.getItem("user")) || null; }
  catch { return null; }
}

async function apiCall(endpoint, method = 'GET', data = null) {
  const options = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (data) options.body = JSON.stringify(data);

  try {
    const response = await fetch(`${API_URL}${endpoint}`, options);
    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
    return await response.json();
  } catch (error) {
    console.error('API Error:', error);
    return null;
  }
}

async function loadFavorites(){
  let container = document.getElementById("favorite-items");
  let emptyMsg = document.getElementById("favorite-empty");
  let user = getCurrentUser();
  let favorites = [];

  container.innerHTML = "";

  if (user) {
    const data = await apiCall(`/favorites/${user.id}`);
    if (data) favorites = data;
  } else {
    favorites = JSON.parse(localStorage.getItem("favorites")) || [];
  }

  if(favorites.length === 0){
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";

  favorites.forEach((item, index) => {
    let productId = "product-" + item.name.replace(/\s+/g, '-');
    let div = document.createElement("div");
    div.classList.add("product-item");

    div.innerHTML = `
      <a href="products.html#${productId}">
        <img src="${item.imgSrc}" alt="${item.name}">
        <h4>${item.name}</h4>
      </a>
      <p>$${item.price}</p>
      <button class="add-to-favorite active" onclick="removeFavorite(${index}, '${encodeURIComponent(item.name)}')">
        <i class="material-icons">favorite</i>
      </button>
    `;
    container.appendChild(div);
  });
}

async function removeFavorite(index, encodedName){
  let user = getCurrentUser();

  if (user) {
    await apiCall(`/favorites/${user.id}/${encodedName}`, 'DELETE');
  }

  let favorites = JSON.parse(localStorage.getItem("favorites")) || [];
  favorites.splice(index, 1);
  localStorage.setItem("favorites", JSON.stringify(favorites));
  loadFavorites();
}

loadFavorites();
</script>

</body>
